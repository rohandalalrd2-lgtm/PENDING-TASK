<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASK ALERT TERMINAL - VIP EDITION</title>
    <style>
        /* Base sizing */
        html { font-size: 125%; }

        :root { 
            --blue: #00d2ff; 
            --deep-blue: #3a7bd5; 
            --obsidian: #020617; 
            --slate: #0f172a; 
            --text: #f1f5f9; 
            --alert-red: #ff3333;
            --alert-green: #00ff88;
        }

        /* --- STRICT UNIFORM TEXT RULE --- */
        body, button, table, th, td, p, h2, span, div {
            font-family: 'Segoe UI', sans-serif !important;
            font-weight: bold !important;
            font-size: 1rem !important;
        }

        body { 
            background-color: var(--obsidian); color: var(--text); 
            margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; 
        }
        
        /* --- INCREASED LAYOUT WIDTH --- */
        .container { 
            width: 98%; max-width: 1600px; background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); border: 1px solid var(--deep-blue); 
            border-radius: 12px; padding: 40px; box-shadow: 0 0 50px rgba(0, 210, 255, 0.15); align-self: center;
        }

        h2 { color: var(--blue); text-align: center; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 10px rgba(0, 210, 255, 0.3); margin-bottom: 20px; }
        
        button { 
            width: auto; padding: 16px 40px; background: linear-gradient(45deg, var(--deep-blue), var(--blue)); 
            color: #fff; border: none; border-radius: 8px; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s;
        }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        
        .table-container { overflow-x: auto; margin-top: 20px; border-radius: 8px; border: 1px solid #1e293b; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        
        th { background: #000; color: var(--blue); padding: 18px; text-align: center; text-transform: uppercase; border-bottom: 2px solid var(--deep-blue); white-space: nowrap; }
        td { padding: 18px; border-bottom: 1px solid #1e293b; text-align: center; transition: background 0.3s; white-space: nowrap; }
        
        .property-tag { color: var(--blue); }
        .person-chip { color: #38bdf8; }

        .warning-row td { 
            background-color: rgba(0, 255, 136, 0.10); color: var(--alert-green) !important;
            border-bottom: 1px solid var(--alert-green); text-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
        }
        .warning-row { animation: pulse 1.35s infinite; }
        .warning-row .property-tag { color: var(--alert-green) !important; }

        .critical-row td { 
            background-color: rgba(255, 51, 51, 0.15); color: var(--alert-red) !important;
            border-bottom: 1px solid var(--alert-red); text-shadow: 0 0 8px rgba(255, 51, 51, 0.4);
        }
        .critical-row { animation: pulse 1.35s infinite; }
        .critical-row .property-tag, .critical-row .person-chip { color: var(--alert-red) !important; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .controls-container { text-align: center; margin-top: 35px; }
    </style>
</head>
<body>

<div class="container">
    <div id="dashboard">
        <div style="text-align: center;">
            <h2>ACTIVE TASK </h2>
            <p id="last-sync-text" style="color: #64748b; margin: 0; text-transform: uppercase;">INITIALIZING LINK...</p>
        </div>
        <div class="table-container">
            <table>
                <thead><tr id="thead-row"></tr></thead>
                <tbody id="tbody-rows"></tbody>
            </table>
        </div>
        <div class="controls-container">
            <button onclick="loadData()" id="sync-btn-element">FORCE SYNC</button>
        </div>
    </div>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbxNhqVMHFAoE0fZ5E52FmVSzmgL0CJfMkTFXBw5AKM7DyiTVYMbhre43ULPxz1mAQOnYA/exec";
    let alarmInterval = null; 
    let hasInteracted = false; 

    // Browsers block audio until the user clicks ANYWHERE on the page. 
    document.body.addEventListener('click', () => { hasInteracted = true; }, { once: true });

    function playTerminalAlert() {
        if (!hasInteracted) return; // Skip if browser blocks it
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            function createBeep(delay, frequency) {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(frequency, audioCtx.currentTime + delay);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime + delay);
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + delay);
                osc.stop(audioCtx.currentTime + delay + 0.15); 
            }
            createBeep(0, 850);   
            createBeep(0.2, 850); 
        } catch (error) { console.log("Audio alert prevented by browser."); }
    }

    // --- MAIN DATA FETCH FUNCTION ---
    async function loadData() {
        const syncBtn = document.getElementById('sync-btn-element');
        syncBtn.innerText = "SYNCING..."; 
        document.getElementById('last-sync-text').innerText = "FETCHING SECURE DATA...";
        
        let url = `${APP_URL}?mode=getData`;

        try {
            const response = await fetch(url);
            const result = await response.json();
            if (!result.error) {
                renderDashboard(result);
            } else {
                document.getElementById('last-sync-text').innerText = "ERROR: " + result.error;
            }
        } catch (err) { 
            document.getElementById('last-sync-text').innerText = "SYNC FAILED. RETRYING SHORTLY.";
        }
        
        syncBtn.innerText = "FORCE SYNC"; 
    }

    function renderDashboard(data) {
        let now = new Date();
        document.getElementById('last-sync-text').innerText = "LAST SYNC: " + now.toLocaleTimeString();
        
        const thead = document.getElementById('thead-row');
        const tbody = document.getElementById('tbody-rows');
        thead.innerHTML = ""; tbody.innerHTML = "";

        data.headers.forEach(h => thead.innerHTML += `<th>${h}</th>`);
        
        let shouldSoundAlarm = false; 

        data.rows.forEach(r => {
            let daysRemaining = parseInt(r[5]);
            let rowClass = ''; 

            if (!isNaN(daysRemaining)) {
                if (daysRemaining < 0) {
                    rowClass = 'critical-row'; 
                    shouldSoundAlarm = true; 
                } else if (daysRemaining >= 0 && daysRemaining <= 3) {
                    rowClass = 'warning-row';  
                    shouldSoundAlarm = true; 
                }
            }

            tbody.innerHTML += `
                <tr class="${rowClass}">
                    <td class="property-tag">${r[0] || ''}</td>
                    <td>${r[1] || ''}</td>
                    <td><span class="person-chip">${r[2] || ''}</span></td>
                    <td>${r[3] || ''}</td>
                    <td>${r[4] || ''}</td>
                    <td>${r[5] || ''}</td>
                    <td>${r[6] || ''}</td>
                </tr>`;
        });

        // Alarm Handling
        if (alarmInterval) {
            clearInterval(alarmInterval);
            alarmInterval = null;
        }

        if (shouldSoundAlarm) {
            playTerminalAlert(); 
            alarmInterval = setInterval(playTerminalAlert, 10000); 
        }
    }

    // Load data immediately when the page opens
    window.onload = () => {
        loadData();
        // Start Auto-Pilot to sync quietly in the background every 30 seconds
        setInterval(loadData, 30000);
    };

</script>
</body>
</html>
