<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASK ALERT TERMINAL - COMMAND CENTER</title>
    <style>
        :root { 
            --blue: #00d2ff; 
            --deep-blue: #3a7bd5; 
            --obsidian: #020617; 
            --slate: #0f172a; 
            --text: #ffffff; 
            
            /* Status Colors */
            --alert-red: #ff0000; 
            --alert-orange: #ff9900;
            --alert-green: #00ff88;
            --alert-blue: #00d2ff;
        }

        /* --- STRICT UNIFORM TEXT & FULL SCREEN RULES --- */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
            background-color: var(--obsidian); 
        }

        body, button, table, th, td, p, h2, span, div, input {
            font-family: 'Segoe UI', sans-serif !important;
            font-weight: bold !important;
        }
        
        /* --- FULL SCREEN CONTAINER --- */
        .container { 
            width: 100vw; 
            height: 100vh; 
            padding: 2vh 2vw; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column;
            background: radial-gradient(circle at center, var(--slate) 0%, var(--obsidian) 100%);
        }

        #dashboard { 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            width: 100%;
        }

        /* --- TOP HEADER & SEARCH --- */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2vh;
        }

        h2 { 
            color: #ffffff; 
            text-transform: uppercase; 
            letter-spacing: 0.5vw; 
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4); 
            margin: 0; 
            font-size: clamp(17px, 2.55vw, 43px) !important; 
        }

        .search-box {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--deep-blue);
            color: var(--blue);
            padding: 1.5vh 2vw;
            border-radius: 8px;
            width: 300px;
            outline: none;
            font-size: clamp(10px, 0.85vw, 17px) !important;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.1);
            transition: 0.3s;
        }
        .search-box:focus { border-color: var(--blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
        .search-box::placeholder { color: rgba(0, 210, 255, 0.5); }

        /* --- STATS HUD --- */
        .stats-hud {
            display: flex;
            gap: 2vw;
            margin-bottom: 2vh;
        }

        .stat-card {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 1.5vh 2vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-label { color: #888; font-size: 0.85vw; text-transform: uppercase; letter-spacing: 2px; }
        .stat-number { font-size: 2vw; text-shadow: 0 0 10px currentColor; }
        
        .color-red { color: var(--alert-red); border-bottom: 2px solid var(--alert-red); }
        .color-blue { color: var(--alert-blue); border-bottom: 2px solid var(--alert-blue); }
        .color-green { color: var(--alert-green); border-bottom: 2px solid var(--alert-green); }

        /* --- TABLE STYLES --- */
        .table-container { 
            flex-grow: 1; 
            overflow-y: auto; 
            overflow-x: auto; 
            border-radius: 8px; 
            border: 1px solid #1e293b; 
            background: rgba(15, 23, 42, 0.6);
        }
        
        table { width: 100%; border-collapse: collapse; }
        
        th { 
            background: #000; 
            color: #ffffff; 
            padding: 1.5vh 2vw; 
            text-align: left; 
            text-transform: uppercase; 
            border-bottom: 2px solid var(--deep-blue); 
            white-space: nowrap; 
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: clamp(10px, 0.85vw, 17px) !important;
        }
        
        td { 
            padding: 1.5vh 2vw; 
            border-bottom: 1px solid #1e293b; 
            text-align: left; 
            transition: background 0.3s; 
            white-space: nowrap; 
            color: #ffffff; 
            font-size: clamp(8.5px, 0.76vw, 16px) !important;
        }

        /* --- STATUS ROW STYLES --- */
        .done-row td { 
            background-color: rgba(0, 255, 136, 0.15); color: #ffffff !important;
            border-bottom: 1px solid var(--alert-green); text-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        .pending-row td { 
            background-color: rgba(0, 210, 255, 0.20); color: #ffffff !important;
            border-bottom: 1px solid var(--alert-blue); text-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        .warning-row td { 
            background-color: rgba(255, 153, 0, 0.25); color: #ffffff !important;
            border-bottom: 1px solid var(--alert-orange); text-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .warning-row { animation: pulse 1.35s infinite; }

        .critical-row td { 
            background-color: rgba(255, 0, 0, 0.25); color: #ffffff !important;
            border-bottom: 1px solid var(--alert-red); text-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .critical-row { animation: pulse 1.35s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* --- FOOTER CONTROLS --- */
        .controls-container { display: flex; justify-content: space-between; align-items: center; margin-top: 2vh; margin-bottom: 1vh; }

        .sync-text { color: var(--blue); font-size: 0.85vw; text-transform: uppercase; letter-spacing: 2px;}

        button { 
            padding: 1.5vh 3vw; 
            background: linear-gradient(45deg, var(--deep-blue), var(--blue)); 
            color: #ffffff; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s;
            font-size: clamp(10px, 0.85vw, 17px) !important;
            letter-spacing: 2px;
        }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--obsidian); }
        ::-webkit-scrollbar-thumb { background: var(--deep-blue); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--blue); }
    </style>
</head>
<body>

<div class="container">
    <div id="dashboard">
        
        <!-- TOP ROW: TITLE & SEARCH -->
        <div class="header-row">
            <h2>TASK TERMINAL</h2>
            <input type="text" id="searchInput" class="search-box" placeholder="SEARCH SYSTEM..." onkeyup="filterTable()">
        </div>

        <!-- STATS HUD -->
        <div class="stats-hud">
            <div class="stat-card color-red">
                <span class="stat-label">Critical</span>
                <span class="stat-number" id="count-critical">0</span>
            </div>
            <div class="stat-card color-blue">
                <span class="stat-label">Pending</span>
                <span class="stat-number" id="count-pending">0</span>
            </div>
            <div class="stat-card color-green">
                <span class="stat-label">Completed</span>
                <span class="stat-number" id="count-done">0</span>
            </div>
        </div>

        <!-- TABLE -->
        <div class="table-container">
            <table id="taskTable">
                <thead><tr id="thead-row"></tr></thead>
                <tbody id="tbody-rows"></tbody>
            </table>
        </div>
        
        <!-- FOOTER: SYNC INFO & BUTTON -->
        <div class="controls-container">
            <div class="sync-text" id="sync-timer-text">NEXT SYNC IN: 30s</div>
            <button onclick="forceSync()" id="sync-btn-element">FORCE SYNC</button>
        </div>

    </div>
</div>

<script>
    // --- IMPORTANT: REPLACE THE URL BELOW WITH YOUR WEB APP DEPLOYMENT URL ---
    const APP_URL = "https://script.google.com/macros/s/AKfycbz-icU4IRnAOiMgQs7Y3iQS3OPFPBfHYAMPqwtmLpxvx7ecDasYIGFlit30z4FhgM2xlA/exec";

    let syncInterval;
    let countdownInterval;
    let timeLeft = 30;

    async function loadData() {
        const syncBtn = document.getElementById('sync-btn-element');
        const timerText = document.getElementById('sync-timer-text');
        
        syncBtn.innerText = "SYNCING..."; 
        timerText.innerText = "FETCHING SECURE DATA...";
        
        let url = `${APP_URL}?mode=getData`;

        try {
            const response = await fetch(url);
            const result = await response.json();
            if (!result.error) {
                renderDashboard(result);
            } else {
                console.error("ERROR: " + result.error);
            }
        } catch (err) { 
            console.error("SYNC FAILED. RETRYING SHORTLY.");
        }
        
        syncBtn.innerText = "FORCE SYNC"; 
        resetTimer(); 
    }

    // --- INSTANT SEARCH/FILTER FUNCTION ---
    function filterTable() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let table = document.getElementById("taskTable");
        let tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) { 
            let rowText = tr[i].innerText.toUpperCase();
            if (rowText.indexOf(input) > -1) {
                tr[i].style.display = "";
            } else {
                tr[i].style.display = "none";
            }
        }
    }

    // --- SYNC COUNTDOWN TIMER ---
    function resetTimer() {
        clearInterval(countdownInterval);
        timeLeft = 30;
        document.getElementById('sync-timer-text').innerText = `NEXT SYNC IN: ${timeLeft}s`;
        
        countdownInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                document.getElementById('sync-timer-text').innerText = `NEXT SYNC IN: ${timeLeft}s`;
            }
        }, 1000);
    }

    function forceSync() {
        clearInterval(syncInterval);
        loadData();
        syncInterval = setInterval(loadData, 30000);
    }

    // --- SMART DATE PARSER ---
    function parseCustomDate(dateStr) {
        if (!dateStr) return 0;
        let d = new Date(dateStr);
        if (!isNaN(d.getTime())) return d.getTime(); 
        let parts = String(dateStr).split(/[-/]/);
        if (parts.length === 3) return new Date(`${parts[2]}-${parts[1]}-${parts[0]}`).getTime();
        return 0;
    }

    function renderDashboard(data) {
        const thead = document.getElementById('thead-row');
        const tbody = document.getElementById('tbody-rows');
        thead.innerHTML = ""; tbody.innerHTML = "";

        let dateColIndex = -1;

        data.headers.forEach((h, index) => {
            let cleanHeader = String(h).toUpperCase();
            if (cleanHeader.includes('COMPLITION') || cleanHeader.includes('COMPLETION')) {
                cleanHeader = 'COMPLETION';
                dateColIndex = index; 
            } else if (cleanHeader.includes('DATE') && dateColIndex === -1) {
                dateColIndex = index; 
            }
            thead.innerHTML += `<th>${cleanHeader}</th>`;
        });

        if (dateColIndex === -1) dateColIndex = 4;

        // --- HUD STAT TRACKERS ---
        let countCritical = 0;
        let countPending = 0;
        let countDone = 0;

        data.rows.sort((a, b) => {
            let isDoneA = a.some(col => String(col).trim().toLowerCase() === 'done');
            let isDoneB = b.some(col => String(col).trim().toLowerCase() === 'done');

            if (isDoneA && !isDoneB) return 1;  
            if (!isDoneA && isDoneB) return -1; 

            if (!isDoneA && !isDoneB) {
                let daysA = parseInt(a[5]);
                let daysB = parseInt(b[5]);
                if (isNaN(daysA)) daysA = 9999; 
                if (isNaN(daysB)) daysB = 9999;
                return daysA - daysB; 
            }

            if (isDoneA && isDoneB) {
                let dateA = parseCustomDate(a[dateColIndex]);
                let dateB = parseCustomDate(b[dateColIndex]);
                return dateB - dateA; 
            }
            return 0;
        });

        data.rows.forEach(r => {
            if (r.join('').trim() === '') return;

            let daysRemaining = parseInt(r[5]);
            let rowClass = ''; 

            let isDone = r.some(col => String(col).trim().toLowerCase() === 'done');
            let isPending = r.some(col => String(col).trim().toLowerCase() === 'pending');

            if (isDone) {
                rowClass = 'done-row'; 
                countDone++;
            } 
            else if (!isNaN(daysRemaining) && daysRemaining < 0) {
                rowClass = 'critical-row'; 
                countCritical++;
            } 
            else {
                rowClass = 'pending-row';
                if (!isNaN(daysRemaining) && daysRemaining >= 0 && daysRemaining <= 3) {
                    rowClass = 'warning-row';
                }
                countPending++;
            }

            let displayDays = isDone ? '-' : (r[5] || '');
            let rowHtml = '';

            data.headers.forEach((h, index) => {
                let cellData = r[index] !== undefined ? r[index] : '';
                if (index === 5) {
                    rowHtml += `<td>${displayDays}</td>`;
                } else {
                    rowHtml += `<td>${cellData}</td>`;
                }
            });

            tbody.innerHTML += `<tr class="${rowClass}">${rowHtml}</tr>`;
        });

        // Update HUD DOM
        document.getElementById('count-critical').innerText = countCritical;
        document.getElementById('count-pending').innerText = countPending;
        document.getElementById('count-done').innerText = countDone;

        filterTable(); 
    }

    window.onload = () => {
        forceSync(); 
    };
</script>
</body>
</html>
